# cert-manager.yaml — ClusterIssuer self-signed + Certificate per nid.local
#
# Prerequisito: installare cert-manager nel cluster con:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
# e attendere che i pod siano ready:
#   kubectl wait --namespace cert-manager --for=condition=ready pod --all --timeout=120s

---
# Step 1: ClusterIssuer "root" self-signed (non usa CA esterna)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

---
# Step 2: CA Certificate — cert-manager genera una CA locale
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nid-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: nid-ca
  secretName: nid-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
# Step 3: ClusterIssuer che usa la CA appena creata per firmare i certificati
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: nid-ca-issuer
spec:
  ca:
    secretName: nid-ca-secret

---
# Step 4: Certificato finale per nid.local
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nid-tls
  namespace: default
spec:
  secretName: nid-tls-secret   # ← questo Secret viene referenziato nell'Ingress
  duration: 8760h                      # 1 anno
  renewBefore: 720h                    # rinnovo automatico 30 giorni prima
  commonName: nid.local
  dnsNames:
    - nid.local
  issuerRef:
    name: nid-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io