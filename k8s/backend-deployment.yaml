apiVersion: apps/v1
kind: Deployment
metadata:
  name: nid-backend
  namespace: nid
  labels:
    app: nid-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nid-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nid-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - nid-backend
                topologyKey: kubernetes.io/hostname

      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: nid-backend
          image: scc_network_intrusion_detection-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          # mTLS: Uvicorn presenta certificato server e verifica certificato client
          # mTLS: run.py crea SSL context con ssl.CERT_REQUIRED
          # che forza la verifica del certificato client
          command: ["python3", "run.py"]

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: artifacts
              mountPath: /app/artifacts
              readOnly: true
            - name: backend-server-tls
              mountPath: /certs/server
              readOnly: true

          env:
            - name: PYTHONUNBUFFERED
              value: "1"

      volumes:
        - name: artifacts
          hostPath:
            path: /artifacts
            type: Directory
        - name: backend-server-tls
          secret:
            secretName: backend-server-tls-secret
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
              - key: ca.crt
                path: ca.crt