apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nid-backend-hpa
  namespace: nid
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nid-backend
  minReplicas: 10
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60