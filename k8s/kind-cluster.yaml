# kind-cluster.yaml — Cluster Kind con 1 control-plane + 2 worker
# Configurazione include:
#   - Port mapping per NGINX Ingress (80, 443) e NodePort (8000, 8501)
#   - Audit logging dell'API server verso /var/log/kubernetes/audit.log

apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: nid-cluster
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            audit-log-path: /var/log/kubernetes/audit.log
            audit-policy-file: /etc/kubernetes/audit/audit-policy.yaml
            audit-log-maxage: "7"
            audit-log-maxbackup: "5"
            audit-log-maxsize: "100"
          extraVolumes:
            - name: audit-policy
              hostPath: /etc/kubernetes/audit/audit-policy.yaml
              mountPath: /etc/kubernetes/audit/audit-policy.yaml
              readOnly: true
              pathType: File
            - name: audit-logs
              hostPath: /var/log/kubernetes
              mountPath: /var/log/kubernetes
              readOnly: false
              pathType: DirectoryOrCreate

    # Il deploy.ps1 sostituisce questo path con il path assoluto prima di creare il cluster
    extraMounts:
      - hostPath: ./k8s/audit-policy.yaml
        containerPath: /etc/kubernetes/audit/audit-policy.yaml
        readOnly: true

    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 30000
        hostPort: 8000
        protocol: TCP
      - containerPort: 30001
        hostPort: 8501
        protocol: TCP

  - role: worker
    labels:
      node-type: worker

  - role: worker
    labels:
      node-type: worker